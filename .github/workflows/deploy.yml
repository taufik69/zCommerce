name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/zcommerce
            # Pull the latest code
            git pull origin main

            # Install only production dependencies
            npm install --production

            echo ">>> Restarting Backend and Worker..."

            # 1. Backend restart (Specific name use kora bhalo)
            pm2 restart "zcommerce-backend" || pm2 start index.js --name "zcommerce-backend"

            # 2. Worker restart
            pm2 restart "zcommerce-worker" || pm2 start npm --name "zcommerce-worker" -- run worker:image

            echo ">>> Backend Deployment complete!"
