name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/zcommerce
            # Set the remote URL
            git remote set-url origin git@github.com:taufik69/zCommerce.git

            # Pull the latest code
            git pull origin main

            # Install only production dependencies
            npm ci --omit=dev

            echo ">>> Restarting Backend and Workers..."

            # 1. Backend restart
            pm2 restart "zcommerce-backend" || pm2 start index.js --name "zcommerce-backend"

            # 2. Image upload worker restart
            pm2 restart "zcommerce-worker" || pm2 start npm --name "zcommerce-worker" -- run worker:image

            # 3. SMS worker restart
            pm2 restart "zcommerce-sms-worker" || pm2 start npm --name "zcommerce-sms-worker" -- run worker:sms

            echo ">>> Backend Deployment complete!"
